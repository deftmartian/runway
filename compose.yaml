services:
  app:
    image: ${RUNWAY_IMAGE:-ghcr.io/deftmartian/runway:latest}
    restart: always
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      # Export data is sensitive and may be substantially larger than general
      # runtime scratch space. This mount is bounded independently and owned by
      # the unprivileged `node` user in the production image.
      - /var/runway/exports:size=${RUNWAY_EXPORT_TMPFS_SIZE:-272m},mode=0700,uid=1000,gid=1000
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - runway-internal
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - ${RUNWAY_BIND_ADDRESS:-127.0.0.1}:${RUNWAY_PORT:-4100}:4100
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-postgres://runway:${POSTGRES_PASSWORD:-runway_dev_password}@db:5432/runway}
      DATABASE_POOL_MAX: ${APP_DATABASE_POOL_MAX:-10}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-10}
      DATABASE_IDLE_TIMEOUT_SECONDS: ${DATABASE_IDLE_TIMEOUT_SECONDS:-30}
      DATABASE_MAX_LIFETIME_SECONDS: ${DATABASE_MAX_LIFETIME_SECONDS:-1800}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      DATABASE_IDLE_TRANSACTION_TIMEOUT_MS: ${DATABASE_IDLE_TRANSACTION_TIMEOUT_MS:-30000}
      ORIGIN: ${ORIGIN:-}
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:-}
      PUBLIC_SOURCE_URL: ${PUBLIC_SOURCE_URL:-https://github.com/deftmartian/runway}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:-}
      AUTH_RATE_LIMIT_SECRET: ${AUTH_RATE_LIMIT_SECRET:-}
      PASSWORD_RESET_RATE_LIMIT_SECRET: ${PASSWORD_RESET_RATE_LIMIT_SECRET:-}
      ANDROID_CREDENTIAL_SECRET: ${ANDROID_CREDENTIAL_SECRET:-}
      ANDROID_APPLICATION_ID: ${ANDROID_APPLICATION_ID:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      ALLOW_OIDC_SIGNUPS: ${ALLOW_OIDC_SIGNUPS:-false}
      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-true}
      ALLOW_LOCAL_SIGNUPS: ${ALLOW_LOCAL_SIGNUPS:-false}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      SMTP_ALLOW_PLAINTEXT: ${SMTP_ALLOW_PLAINTEXT:-false}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      IMPORT_SECRET_KEY: ${IMPORT_SECRET_KEY:-}
      NEXTCLOUD_ALLOWED_ORIGINS: ${NEXTCLOUD_ALLOWED_ORIGINS:-}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-}
      PASSKEY_RP_NAME: ${PASSKEY_RP_NAME:-runway}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-12M}
      RUNWAY_EXPORT_STAGING_DIRECTORY: /var/runway/exports
      RUNWAY_EXPORT_MAX_BYTES: ${RUNWAY_EXPORT_MAX_BYTES:-268435456}
      RUNWAY_EXPORT_STAGING_QUOTA_BYTES: ${RUNWAY_EXPORT_STAGING_QUOTA_BYTES:-268435456}
      RUNWAY_EXPORT_MAX_CONCURRENT: ${RUNWAY_EXPORT_MAX_CONCURRENT:-1}
      IMPORT_WORKER_ENABLED: 'false'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4100/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 4
    stop_grace_period: 20s

  worker:
    image: ${RUNWAY_IMAGE:-ghcr.io/deftmartian/runway:latest}
    restart: always
    init: true
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - runway-internal
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-postgres://runway:${POSTGRES_PASSWORD:-runway_dev_password}@db:5432/runway}
      DATABASE_POOL_MAX: ${WORKER_DATABASE_POOL_MAX:-5}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-10}
      DATABASE_IDLE_TIMEOUT_SECONDS: ${DATABASE_IDLE_TIMEOUT_SECONDS:-30}
      DATABASE_MAX_LIFETIME_SECONDS: ${DATABASE_MAX_LIFETIME_SECONDS:-1800}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      DATABASE_IDLE_TRANSACTION_TIMEOUT_MS: ${DATABASE_IDLE_TRANSACTION_TIMEOUT_MS:-30000}
      ORIGIN: ${ORIGIN:-}
      PUBLIC_APP_ORIGIN: ${PUBLIC_APP_ORIGIN:-}
      PUBLIC_SOURCE_URL: ${PUBLIC_SOURCE_URL:-https://github.com/deftmartian/runway}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_SECRETS: ${BETTER_AUTH_SECRETS:-}
      AUTH_RATE_LIMIT_SECRET: ${AUTH_RATE_LIMIT_SECRET:-}
      PASSWORD_RESET_RATE_LIMIT_SECRET: ${PASSWORD_RESET_RATE_LIMIT_SECRET:-}
      ANDROID_CREDENTIAL_SECRET: ${ANDROID_CREDENTIAL_SECRET:-}
      ANDROID_APPLICATION_ID: ${ANDROID_APPLICATION_ID:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      ALLOW_OIDC_SIGNUPS: ${ALLOW_OIDC_SIGNUPS:-false}
      LOCAL_AUTH_ENABLED: ${LOCAL_AUTH_ENABLED:-true}
      ALLOW_LOCAL_SIGNUPS: ${ALLOW_LOCAL_SIGNUPS:-false}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_TLS_MODE: ${SMTP_TLS_MODE:-starttls}
      SMTP_ALLOW_PLAINTEXT: ${SMTP_ALLOW_PLAINTEXT:-false}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      IMPORT_SECRET_KEY: ${IMPORT_SECRET_KEY:-}
      NEXTCLOUD_ALLOWED_ORIGINS: ${NEXTCLOUD_ALLOWED_ORIGINS:-}
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-}
      PASSKEY_RP_NAME: ${PASSKEY_RP_NAME:-runway}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-12M}
      IMPORT_WORKER_ENABLED: 'true'
      AUDIT_EVENT_RETENTION_DAYS: ${AUDIT_EVENT_RETENTION_DAYS:-}
      HOST: 127.0.0.1
      PORT: '4101'
    command: ['node', 'build']
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4101/health/worker').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 4
    stop_grace_period: 20s

  migrate:
    image: ${RUNWAY_IMAGE:-ghcr.io/deftmartian/runway:latest}
    restart: 'no'
    depends_on:
      db:
        condition: service_healthy
    command: ['node', 'scripts/run-migrations.mjs']
    environment:
      DATABASE_URL: ${APP_DATABASE_URL:-postgres://runway:${POSTGRES_PASSWORD:-runway_dev_password}@db:5432/runway}
    networks:
      - runway-internal

  db:
    image: postgres:17.10-alpine3.24@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: always
    ports:
      - 127.0.0.1:5432:5432
    environment:
      POSTGRES_USER: runway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-runway_dev_password}
      POSTGRES_DB: runway
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U runway -d runway']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    networks:
      - runway-internal
networks:
  runway-internal:
    driver: bridge
volumes:
  pgdata:
