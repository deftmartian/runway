name: Container

# Build only for image inputs; main and version-tag runs publish the tested artifact.
on:
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.audit
      - .dockerignore
      - compose.yaml
      - deploy/compose.production.yaml
      - deploy/compose.ipvlan.yaml
      - drizzle/**
      - src/**
      - static/**
      - scripts/generate-secret.mjs
      - scripts/run-migrations.mjs
      - scripts/verify-image.mjs
      - scripts/verify-preview.mjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - svelte.config.js
      - vite.config.ts
      - .github/workflows/container.yml
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - Dockerfile
      - Dockerfile.audit
      - .dockerignore
      - compose.yaml
      - deploy/compose.production.yaml
      - deploy/compose.ipvlan.yaml
      - drizzle/**
      - src/**
      - static/**
      - scripts/generate-secret.mjs
      - scripts/run-migrations.mjs
      - scripts/verify-image.mjs
      - scripts/verify-preview.mjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - svelte.config.js
      - vite.config.ts
      - .github/workflows/container.yml
  workflow_dispatch:

concurrency:
  group: runway-container-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    env:
      RUNWAY_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      APP_DATABASE_URL: postgres://runway:runway_ci_database_password@db:5432/runway
      POSTGRES_PASSWORD: runway_ci_database_password
      ORIGIN: https://runway.example.test
      PUBLIC_APP_ORIGIN: https://runway.example.test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Configure ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(node scripts/generate-secret.mjs)" >> "$GITHUB_ENV"
      - name: Set up QEMU for release tags
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref_name == github.event.repository.default_branch }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: RUNWAY_BUILD_ID=${{ github.sha }}
          provenance: ${{ github.event_name == 'pull_request' && 'false' || 'mode=max' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=runway-container
          cache-to: type=gha,mode=max,scope=runway-container
      - name: Pull published image
        if: github.event_name != 'pull_request'
        run: docker pull "${RUNWAY_IMAGE}"
      - name: Scan runtime image
        run: node scripts/verify-image.mjs "${RUNWAY_IMAGE}"
      - name: Start image-backed production stack
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml up -d --wait app worker
      - name: Verify production runtime and PWA revision
        run: SITE_URL=http://127.0.0.1:4100 node scripts/verify-preview.mjs
      - name: Container diagnostics
        if: failure()
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml ps && docker compose -f compose.yaml -f deploy/compose.production.yaml logs --no-color --tail=200 app worker migrate db
      - name: Stop containers
        if: always()
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml down --volumes

  android-release:
    name: signed Android APK
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: android-release
    permissions:
      contents: read
    env:
      RUNWAY_ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/runway-release.jks
      RUNWAY_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.RUNWAY_ANDROID_KEYSTORE_PASSWORD }}
      RUNWAY_ANDROID_KEY_ALIAS: ${{ secrets.RUNWAY_ANDROID_KEY_ALIAS }}
      RUNWAY_ANDROID_KEY_PASSWORD: ${{ secrets.RUNWAY_ANDROID_KEY_PASSWORD }}
      RUNWAY_ANDROID_KEYSTORE_BASE64: ${{ secrets.RUNWAY_ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/*.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties
            android/app/*.gradle.kts
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Materialize protected signing identity
        shell: bash
        run: |
          for name in \
            RUNWAY_ANDROID_KEYSTORE_BASE64 \
            RUNWAY_ANDROID_KEYSTORE_PASSWORD \
            RUNWAY_ANDROID_KEY_ALIAS \
            RUNWAY_ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::The android-release environment is missing ${name}."
              exit 1
            fi
          done
          printf '%s' "$RUNWAY_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNWAY_ANDROID_KEYSTORE_FILE"
          chmod 600 "$RUNWAY_ANDROID_KEYSTORE_FILE"
          test -s "$RUNWAY_ANDROID_KEYSTORE_FILE"
      - name: Verify release identity and source contracts
        run: corepack pnpm verify:android && corepack pnpm verify:android:version
      - name: Build signed release APK
        run: >-
          android/gradlew -p android --no-daemon --stacktrace --dependency-verification strict
          lint test assembleRelease
      - name: Verify signed APK boundary
        shell: bash
        run: |
          node scripts/verify-android-artifact.mjs release
          verification="$("$ANDROID_HOME/build-tools/36.0.0/apksigner" verify \
            --verbose --print-certs android/app/build/outputs/apk/release/app-release.apk)"
          printf '%s\n' "$verification"
          grep -q '^Verified using v2 scheme (APK Signature Scheme v2): true$' <<< "$verification"
          grep -q '^Verified using v3 scheme (APK Signature Scheme v3): true$' <<< "$verification"
          grep -q '^Number of signers: 1$' <<< "$verification"
      - name: Prepare Android release assets
        shell: bash
        run: |
          mkdir -p release-assets
          apk="release-assets/runway-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$apk"
          sha256sum "$apk" > "${apk}.sha256"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs "$apk" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: /SHA-256: /p' \
            > "${apk}.signer.txt"
          test -s "${apk}.signer.txt"
      - name: Upload signed Android release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-android-release
          path: release-assets/
          if-no-files-found: error
          retention-days: 14
      - name: Remove signing material
        if: always()
        run: rm -f "$RUNWAY_ANDROID_KEYSTORE_FILE"

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [image, android-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download signed Android release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: signed-android-release
          path: release-assets
      - name: Publish GitHub release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = context.ref.replace('refs/tags/', '');
            const request = { ...context.repo, tag };
            let existing;
            try {
              existing = await github.rest.repos.getReleaseByTag(request);
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (existing) {
              existing = await github.rest.repos.updateRelease({
                ...context.repo,
                release_id: existing.data.id,
                tag_name: tag,
                target_commitish: context.sha,
                name: existing.data.name,
                body: existing.data.body,
                make_latest: 'true'
              });
              core.info(`Release ${tag} updated.`);
            } else {
              existing = await github.rest.repos.createRelease({
                ...context.repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: `runway ${tag.replace(/^v/, '')}`,
                body: [
                  'runway is a self-hosted running planner and activity decision ledger.',
                  '',
                  `Container: ghcr.io/${context.repo.owner}/${context.repo.repo}:${tag}`,
                  `Android: runway-${tag}.apk (choose the server in the app)`,
                  '',
                  'This tag passed the web, container, and signed Android release checks. See the README for installation and deployment.'
                ].join('\n'),
                generate_release_notes: true,
                make_latest: 'true'
              });
            }
            const releaseId = existing.data.id;
            const currentAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              ...context.repo,
              release_id: releaseId,
              per_page: 100
            });
            for (const name of fs.readdirSync('release-assets').sort()) {
              const file = path.join('release-assets', name);
              const prior = currentAssets.find((asset) => asset.name === name);
              if (prior) {
                await github.rest.repos.deleteReleaseAsset({
                  ...context.repo,
                  asset_id: prior.id
                });
              }
              await github.rest.repos.uploadReleaseAsset({
                ...context.repo,
                release_id: releaseId,
                name,
                headers: {
                  'content-type': name.endsWith('.apk')
                    ? 'application/vnd.android.package-archive'
                    : 'text/plain'
                },
                data: fs.readFileSync(file)
              });
            }
