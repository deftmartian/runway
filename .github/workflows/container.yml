name: Container

# Build only for image inputs; main and version-tag runs publish the tested artifact.
on:
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.audit
      - .dockerignore
      - compose.yaml
      - deploy/compose.production.yaml
      - deploy/compose.ipvlan.yaml
      - drizzle/**
      - src/**
      - static/**
      - scripts/**
      - tests/fixtures/migrations/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - svelte.config.js
      - vite.config.ts
      - .github/workflows/container.yml
      - .github/workflows/check.yml
      - .github/workflows/browser.yml
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - Dockerfile
      - Dockerfile.audit
      - .dockerignore
      - compose.yaml
      - deploy/compose.production.yaml
      - deploy/compose.ipvlan.yaml
      - drizzle/**
      - src/**
      - static/**
      - scripts/**
      - tests/fixtures/migrations/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - svelte.config.js
      - vite.config.ts
      - .github/workflows/container.yml
      - .github/workflows/check.yml
      - .github/workflows/browser.yml
  workflow_dispatch:

concurrency:
  group: runway-container-${{ github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  checks:
    name: release check matrix
    uses: ./.github/workflows/check.yml

  browser:
    name: release browser suites
    uses: ./.github/workflows/browser.yml

  image:
    needs: [checks, browser]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    env:
      RUNWAY_IMAGE: runway-candidate-local:${{ github.sha }}
      RUNWAY_CANDIDATE_IMAGE: ghcr.io/${{ github.repository }}:candidate-${{ github.sha }}
      APP_DATABASE_URL: postgres://runway:runway_ci_database_password@db:5432/runway
      MIGRATION_DATABASE_URL: postgres://runway:runway_ci_database_password@db:5432/runway
      POSTGRES_PASSWORD: runway_ci_database_password
      ORIGIN: https://runway.example.test
      PUBLIC_APP_ORIGIN: https://runway.example.test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install migration verification dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Configure ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(node scripts/generate-secret.mjs)" >> "$GITHUB_ENV"
      - name: Set up QEMU for published candidates
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build local pull-request candidate
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ env.RUNWAY_IMAGE }}
          build-args: RUNWAY_BUILD_ID=${{ github.sha }}
          provenance: false
          cache-from: type=gha,scope=runway-container
          cache-to: type=gha,mode=max,scope=runway-container
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate verified image metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build immutable multi-architecture candidate
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.RUNWAY_CANDIDATE_IMAGE }}
          build-args: RUNWAY_BUILD_ID=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=runway-container
          cache-to: type=gha,mode=max,scope=runway-container
      - name: Load exact published AMD64 candidate
        if: github.event_name != 'pull_request'
        run: |
          docker pull --platform linux/amd64 "$RUNWAY_CANDIDATE_IMAGE"
          docker tag "$RUNWAY_CANDIDATE_IMAGE" "$RUNWAY_IMAGE"
      - name: Scan local runtime candidate
        run: node scripts/verify-image.mjs "${RUNWAY_IMAGE}"
      - name: Start image-backed production stack
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml up -d --wait app worker
      - name: Verify production runtime and PWA revision
        run: SITE_URL=http://127.0.0.1:4100 node scripts/verify-preview.mjs
      - name: Verify exact-image upgrades from both released migration histories
        env:
          RUNWAY_MIGRATION_IMAGE: ${{ env.RUNWAY_IMAGE }}
        run: |
          node scripts/verify-upgrade-migrations.mjs
          node scripts/verify-rebased-migrations.mjs
      - name: Verify exact ARM64 candidate runtime and migration contract
        if: github.event_name != 'pull_request'
        run: >-
          docker run --rm --platform linux/arm64 --network host
          -e DATABASE_URL=postgres://runway:${POSTGRES_PASSWORD}@127.0.0.1:5432/runway
          "$RUNWAY_CANDIDATE_IMAGE" node scripts/run-migrations.mjs
      - name: Container diagnostics
        if: failure()
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml ps && docker compose -f compose.yaml -f deploy/compose.production.yaml logs --no-color --tail=200 app worker migrate db
      - name: Stop containers
        if: always()
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml down --volumes
      - name: Promote exact verified candidate manifest
        if: github.event_name != 'pull_request'
        env:
          FINAL_IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          tags=()
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then tags+=(--tag "$tag"); fi
          done <<< "$FINAL_IMAGE_TAGS"
          test "${#tags[@]}" -gt 0
          docker buildx imagetools create "${tags[@]}" "$RUNWAY_CANDIDATE_IMAGE"

  android-build:
    name: unsigned Android APK
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/*.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties
            android/app/*.gradle.kts
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Verify release identity and source contracts
        run: corepack pnpm verify:android && corepack pnpm verify:android:version
      - name: Build unsigned release APK
        run: >-
          android/gradlew -p android --no-daemon --stacktrace --dependency-verification strict
          -PrunwayFdroidSourceBuild=true lint test assembleRelease
      - name: Verify unsigned APK boundary
        run: node scripts/verify-android-artifact.mjs release
      - name: Upload unsigned Android release candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-android-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 1

  android-release:
    name: signed Android APK
    if: startsWith(github.ref, 'refs/tags/v')
    needs: android-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: android-release
    permissions:
      contents: read
    steps:
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: build-tools;36.0.0
      - name: Download unsigned Android release candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: unsigned-android-release
          path: unsigned
      - name: Sign protected Android release candidate
        shell: bash
        env:
          RUNWAY_ANDROID_KEYSTORE_BASE64: ${{ secrets.RUNWAY_ANDROID_KEYSTORE_BASE64 }}
          RUNWAY_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.RUNWAY_ANDROID_KEYSTORE_PASSWORD }}
          RUNWAY_ANDROID_KEY_ALIAS: ${{ secrets.RUNWAY_ANDROID_KEY_ALIAS }}
          RUNWAY_ANDROID_KEY_PASSWORD: ${{ secrets.RUNWAY_ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          keystore="${RUNNER_TEMP}/runway-release.jks"
          trap 'rm -f "$keystore"' EXIT
          for name in \
            RUNWAY_ANDROID_KEYSTORE_BASE64 \
            RUNWAY_ANDROID_KEYSTORE_PASSWORD \
            RUNWAY_ANDROID_KEY_ALIAS \
            RUNWAY_ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::The android-release environment is missing ${name}."
              exit 1
            fi
          done
          printf '%s' "$RUNWAY_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
          chmod 600 "$keystore"
          test -s "$keystore"
          mkdir -p release-assets
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "$RUNWAY_ANDROID_KEY_ALIAS" \
            --ks-pass env:RUNWAY_ANDROID_KEYSTORE_PASSWORD \
            --key-pass env:RUNWAY_ANDROID_KEY_PASSWORD \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "release-assets/runway-${GITHUB_REF_NAME}.apk" \
            unsigned/app-release-unsigned.apk
      - name: Verify signed APK and prepare provenance records
        shell: bash
        env:
          RUNWAY_ANDROID_CERT_SHA256: ${{ vars.RUNWAY_ANDROID_CERT_SHA256 }}
        run: |
          set -euo pipefail
          apk="release-assets/runway-${GITHUB_REF_NAME}.apk"
          verification="$("$ANDROID_HOME/build-tools/36.0.0/apksigner" verify \
            --verbose --print-certs "$apk")"
          printf '%s\n' "$verification"
          grep -q '^Verified using v2 scheme (APK Signature Scheme v2): true$' <<< "$verification"
          grep -q '^Verified using v3 scheme (APK Signature Scheme v3): true$' <<< "$verification"
          grep -q '^Number of signers: 1$' <<< "$verification"
          expected="$(tr '[:upper:]' '[:lower:]' <<< "${RUNWAY_ANDROID_CERT_SHA256//:/}" | tr -d '[:space:]')"
          actual="$(sed -n 's/^Signer #1 certificate SHA-256 digest: //p' <<< "$verification" \
            | tr '[:upper:]' '[:lower:]' | tr -d ':[:space:]')"
          if [[ ! "$expected" =~ ^[0-9a-f]{64}$ ]]; then
            echo "::error::The android-release environment must define RUNWAY_ANDROID_CERT_SHA256 as a SHA-256 fingerprint."
            exit 1
          fi
          if [ "$actual" != "$expected" ]; then
            echo "::error::The APK signer does not match the pinned Android release certificate."
            exit 1
          fi
          (
            cd release-assets
            sha256sum "$(basename "$apk")" > "$(basename "$apk").sha256"
          )
          printf 'SHA-256: %s\n' "$actual" > "${apk}.signer.txt"
          test -s "${apk}.sha256"
          test -s "${apk}.signer.txt"
      - name: Upload signed Android release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-android-release
          path: release-assets/
          if-no-files-found: error
          retention-days: 14

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [image, android-release]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download signed Android release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: signed-android-release
          path: release-assets
      - name: Publish GitHub release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = context.ref.replace('refs/tags/', '');
            const request = { ...context.repo, tag };
            let existing;
            try {
              existing = await github.rest.repos.getReleaseByTag(request);
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            if (existing) {
              existing = await github.rest.repos.updateRelease({
                ...context.repo,
                release_id: existing.data.id,
                tag_name: tag,
                target_commitish: context.sha,
                name: existing.data.name,
                body: existing.data.body,
                make_latest: 'legacy'
              });
              core.info(`Release ${tag} updated.`);
            } else {
              existing = await github.rest.repos.createRelease({
                ...context.repo,
                tag_name: tag,
                target_commitish: context.sha,
                name: `runway ${tag.replace(/^v/, '')}`,
                body: [
                  'runway is a self-hosted running planner and activity decision ledger.',
                  '',
                  `Container: ghcr.io/${context.repo.owner}/${context.repo.repo}:${tag}`,
                  `Android: runway-${tag}.apk (choose the server in the app)`,
                  '',
                  'This tag passed the web, container, and signed Android release checks. See the README for installation and deployment.'
                ].join('\n'),
                generate_release_notes: true,
                make_latest: 'legacy'
              });
            }
            const releaseId = existing.data.id;
            const currentAssets = await github.paginate(github.rest.repos.listReleaseAssets, {
              ...context.repo,
              release_id: releaseId,
              per_page: 100
            });
            for (const name of fs.readdirSync('release-assets').sort()) {
              const file = path.join('release-assets', name);
              const prior = currentAssets.find((asset) => asset.name === name);
              if (prior) {
                await github.rest.repos.deleteReleaseAsset({
                  ...context.repo,
                  asset_id: prior.id
                });
              }
              await github.rest.repos.uploadReleaseAsset({
                ...context.repo,
                release_id: releaseId,
                name,
                headers: {
                  'content-type': name.endsWith('.apk')
                    ? 'application/vnd.android.package-archive'
                    : 'text/plain'
                },
                data: fs.readFileSync(file)
              });
            }
