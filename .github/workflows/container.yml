name: Container

# Build only for image inputs; main and version-tag runs publish the tested artifact.
on:
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.audit
      - .dockerignore
      - compose.yaml
      - deploy/compose.production.yaml
      - deploy/compose.ipvlan.yaml
      - drizzle/**
      - src/**
      - static/**
      - scripts/run-migrations.mjs
      - scripts/verify-image.mjs
      - scripts/verify-preview.mjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - svelte.config.js
      - vite.config.ts
      - .github/workflows/container.yml
  push:
    branches: [main, master]
    tags: ['v*']
    paths:
      - Dockerfile
      - Dockerfile.audit
      - .dockerignore
      - compose.yaml
      - deploy/compose.production.yaml
      - deploy/compose.ipvlan.yaml
      - drizzle/**
      - src/**
      - static/**
      - scripts/run-migrations.mjs
      - scripts/verify-image.mjs
      - scripts/verify-preview.mjs
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - .npmrc
      - svelte.config.js
      - vite.config.ts
      - .github/workflows/container.yml
  workflow_dispatch:

concurrency:
  group: runway-container-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  image:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    env:
      RUNWAY_IMAGE: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      APP_DATABASE_URL: postgres://runway:runway_ci_database_password@db:5432/runway
      POSTGRES_PASSWORD: runway_ci_database_password
      BETTER_AUTH_SECRET: runway-ci-auth-secret-with-at-least-32-characters
      ORIGIN: https://runway.example.test
      PUBLIC_APP_ORIGIN: https://runway.example.test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up QEMU for release tags
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' || github.ref_name == github.event.repository.default_branch }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and publish image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: RUNWAY_BUILD_ID=${{ github.sha }}
          provenance: ${{ github.event_name == 'pull_request' && 'false' || 'mode=max' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=runway-container
          cache-to: type=gha,mode=max,scope=runway-container
      - name: Pull published image
        if: github.event_name != 'pull_request'
        run: docker pull "${RUNWAY_IMAGE}"
      - name: Scan runtime image
        run: node scripts/verify-image.mjs "${RUNWAY_IMAGE}"
      - name: Start image-backed production stack
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml up -d --wait app worker
      - name: Verify production runtime and PWA revision
        run: SITE_URL=http://127.0.0.1:4100 node scripts/verify-preview.mjs
      - name: Container diagnostics
        if: failure()
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml ps && docker compose -f compose.yaml -f deploy/compose.production.yaml logs --no-color --tail=200 app worker migrate db
      - name: Stop containers
        if: always()
        run: docker compose -f compose.yaml -f deploy/compose.production.yaml down --volumes

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Publish GitHub release
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const request = { ...context.repo, tag };
            try {
              await github.rest.repos.getReleaseByTag(request);
              core.info(`Release ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            await github.rest.repos.createRelease({
              ...context.repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `runway ${tag.replace(/^v/, '')}`,
              body: [
                'The initial public release of runway: a self-hosted decision ledger for conservative running plans.',
                '',
                '### Highlights',
                '- Four truthful starting paths: established baseline, foundation then goal, foundation only, and timed calibration.',
                '- Generated recommendation, current edited plan, and actual recorded work remain distinct.',
                '- Explicit workout edits and consequence choices without silent plan changes.',
                '- Local auth, OIDC, 2FA, passkeys, GPX review, Nextcloud sync, history, and exact plan traces.',
                '- One tested AMD64/ARM64 image for migrations, the web app, and the import worker.',
                '',
                `Container: ghcr.io/${context.repo.owner}/${context.repo.repo}:${tag}`,
                '',
                'See the README for container startup and the deployment guide for the production contract.'
              ].join('\n'),
              generate_release_notes: true,
              make_latest: 'true'
            });
