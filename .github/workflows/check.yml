name: Check

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: runway-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/*.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties
            android/app/*.gradle.kts
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Production dependency advisory gate
        run: corepack pnpm verify:dependencies
      - name: Documentation and publication metadata
        run: corepack pnpm verify:docs
      - name: Static, unit, and production build checks
        run: corepack pnpm verify
      - name: Compose configuration
        run: corepack pnpm verify:compose && corepack pnpm verify:compose:production
      - name: Android TWA static contract
        run: corepack pnpm verify:android
      - name: Android lint, unit, and debug build
        run: corepack pnpm verify:android:build
      - name: Android release identity and signing guard
        run: corepack pnpm verify:android:release
      - name: Caddy edge contract
        run: corepack pnpm verify:caddy

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17.10-alpine3.24@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: runway
          POSTGRES_PASSWORD: runway_ci_password
          POSTGRES_DB: runway_browser
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runway -d runway_browser"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://runway:runway_ci_password@127.0.0.1:5432/runway_browser
      RUNWAY_TEST_DATABASE_URL: postgres://runway:runway_ci_password@127.0.0.1:5432/runway_browser
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Install Chromium
        run: corepack pnpm exec playwright install --with-deps chromium
      - name: Configure ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(corepack pnpm --silent secret:generate)" >> "$GITHUB_ENV"
      - name: Full browser suite
        run: corepack pnpm test:e2e
      - name: Production preview contract
        run: |
          corepack pnpm db:migrate
          RUNWAY_BUILD_ID="ci-preview-${GITHUB_SHA}" corepack pnpm build
          SITE_URL=http://127.0.0.1:4100 corepack pnpm verify:preview:local

  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17.10-alpine3.24@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: runway
          POSTGRES_PASSWORD: runway_ci_password
          POSTGRES_DB: runway_visual
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runway -d runway_visual"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      RUNWAY_TEST_DATABASE_URL: postgres://runway:runway_ci_password@127.0.0.1:5432/runway_visual
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Install Chromium
        run: corepack pnpm exec playwright install --with-deps chromium
      - name: Configure ephemeral auth secret
        run: echo "BETTER_AUTH_SECRET=$(corepack pnpm --silent secret:generate)" >> "$GITHUB_ENV"
      - name: Visual regression suite
        run: corepack pnpm test:visual
      - name: PWA install screenshot currentness
        run: corepack pnpm assets:pwa:check
