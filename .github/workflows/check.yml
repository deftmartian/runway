name: Check

# Functional and visual coverage lives in browser.yml, which pins the browser
# container and snapshot fonts instead of duplicating those suites on the host runner.

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: runway-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: |
            android/*.gradle.kts
            android/gradle/wrapper/gradle-wrapper.properties
            android/app/*.gradle.kts
      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@10.32.0 --activate
      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile
      - name: Production dependency advisory gate
        run: corepack pnpm verify:dependencies
      - name: Documentation and publication metadata
        run: corepack pnpm verify:docs
      - name: Static, unit, and production build checks
        run: corepack pnpm verify
      - name: PWA generated assets currentness
        run: corepack pnpm verify:pwa:assets
      - name: Compose configuration
        run: corepack pnpm verify:compose && corepack pnpm verify:compose:production
      - name: Android TWA static contract
        run: corepack pnpm verify:android
      - name: Android lint
        run: >-
          android/gradlew -p android --no-daemon --stacktrace --dependency-verification strict
          -PrunwayOrigin=https://runway.example.test lint
      - name: Android unit tests
        run: >-
          android/gradlew -p android --no-daemon --stacktrace --dependency-verification strict
          -PrunwayOrigin=https://runway.example.test test
      - name: Android debug build
        run: >-
          android/gradlew -p android --no-daemon --stacktrace --dependency-verification strict
          -PrunwayOrigin=https://runway.example.test assembleDebug
      - name: Android debug artifact contract
        run: node scripts/verify-android-artifact.mjs debug
      - name: Android release identity and signing guard
        run: corepack pnpm verify:android:release
      - name: Caddy edge contract
        run: corepack pnpm verify:caddy
