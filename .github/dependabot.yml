version: 2
updates:
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
      day: sunday
      time: '06:15'
      timezone: Etc/UTC
    groups:
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
  - package-ecosystem: docker
    directory: /
    open-pull-requests-limit: 3
    schedule:
      interval: weekly
      day: sunday
      time: '06:30'
      timezone: Etc/UTC
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 3
    schedule:
      interval: weekly
      day: sunday
      time: '06:45'
      timezone: Etc/UTC
    groups:
      github-actions:
        patterns: ['*']
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
  - package-ecosystem: gradle
    directory: /android
    open-pull-requests-limit: 3
    schedule:
      interval: weekly
      day: sunday
      time: '07:00'
      timezone: Etc/UTC
    groups:
      android-dependencies:
        patterns: ['*']
